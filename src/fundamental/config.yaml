# ════════════════════════════════════════════════════════════════
# Analysis Config — LLM & Embedding Pipeline
# ════════════════════════════════════════════════════════════════
enabled: true

# ── Backend Selection ─────────────────────────────────────────
# LLM backend: "ckey" (REST API) hoặc "gradio" (Gradio client)
llm_backend: "ckey"

# Embedding backend: "gradio" (hiện tại chỉ hỗ trợ gradio)
embedding_backend: "gradio"

# ── CKey API (REST) ──────────────────────────────────────────
ckey:
  model: "mistral-small-4-119b-2603"
  url: "https://ckey.vn/v1/chat/completions"
  # API key đọc từ .env → CKEY_API

# ── LLM Gradio ──────────────────────────────────────────────
llm:
  model: "unsloth/Qwen2.5-14B-Instruct-bnb-4bit"
  gradio_url: ""

# ── Embedding Gradio ────────────────────────────────────────
embedding:
  model: "perplexity-ai/pplx-embed-context-v1-4b"
  gradio_url: "https://f4b37a689413db59bd.gradio.live/"
  dim: 2560

# ── Projection (giảm chiều cho agent) ───────────────────────
projection: [1024, 512, 128]  # 2560→1024→512→128
