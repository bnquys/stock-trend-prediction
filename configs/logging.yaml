# ════════════════════════════════════════════════════════════════
# Logging Config — Per-component level control
# ════════════════════════════════════════════════════════════════

# Base directory for log files (mỗi run tạo subfolder train_<timestamp>/)
base_dir: "artifacts/logs"

# File handler: RotatingFileHandler — chia file khi đạt max_bytes
# Giữ tối đa backup_count file cũ (train.log.1, train.log.2, ...)
file:
  level: DEBUG
  max_bytes: 5_000_000     # 5MB mỗi file
  backup_count: 100        # Giữ tối đa 100 file cũ (không xóa trong thực tế)

# Console handler: mặc định WARNING (ít output trong notebook)
console:
  level: WARNING

# Per-component override
# Key = logger name prefix, value = {file: <level>, console: <level>}
# Nếu không khai báo → dùng mức mặc định ở trên
loggers:
  src.rl:
    file: DEBUG
    console: WARNING

  src.training:
    file: DEBUG
    console: WARNING

  stock_analysis:
    file: WARNING
    console: WARNING

  src.rl.env:
    file: DEBUG
    console: WARNING
