# ════════════════════════════════════════════════════════════════
# Base Config — Shared defaults
# ════════════════════════════════════════════════════════════════
project:
  seed: 42

data:
  paths:
    - "artifacts/data/VNM.csv"
    - "artifacts/data/FPT.csv"
    - "artifacts/data/VIC.csv"
    - "artifacts/data/HPG.csv"
  source: "VCI"

split:
  train_ratio: 0.8
  val_ratio:   0.1

output:
  model_dir:  "artifacts/weights"
  log_dir:    "artifacts/logs"
  chart_dir:  "artifacts/outputs"
  dpi:        150
