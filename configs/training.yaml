# ════════════════════════════════════════════════════════════════
# Training Config — Loop & Optimization
# ════════════════════════════════════════════════════════════════
n_episodes:         500
patience:           80        # Early stop patience
checkpoint_every:   50

# Performance optimization — CPU-focused
val_every:          10        # Validate mỗi 10 episodes (giảm 50% val overhead)
learn_every:        8         # Learn mỗi 8 steps (giảm 50% gradient updates)
preload_embeddings: true      # Pre-load ALL embeddings vào RAM (zero I/O)

# Display
show_step_progress: false     # Inner step progress bar (true để debug từng step)
