# ================================================================
# VNM RL Trading v6.0 — Cấu hình huấn luyện
# ================================================================
project:
  seed: 42

data:
  path: "data/VNM_2225.csv"
  symbol: "VNM"
  source: "VCI"

split:
  train_ratio: 0.70   # ~639 rows
  val_ratio:   0.15   # ~137 rows

env:
  window:       20
  initial_cap:  100_000_000   # 100 triệu VND
  tx_cost:      0.0015        # 0.15% phí mua/bán
  sell_tax:     0.001         # 0.1% thuế bán (HOSE)
  slippage:     0.0003        # 0.03% slippage
  stop_loss:    0.07          # cắt lỗ 7%
  take_profit:  0.10          # chốt lời 10% (thực tế hơn cho VN)
  max_hold:     60            # tối đa 60 phiên
  t_plus:       2             # T+2 HOSE
  lot_size:     100           # 1 lô = 100 cp (HOSE)
  price_limit:  0.07          # ±7% trần/sàn HOSE
  trade_penalty: 0.3          # phạt 0.3 reward mỗi lần trade (giảm overtrade)

agent:
  hidden:       [128, 64]
  lr:           0.0005
  gamma:        0.95
  tau:          0.01
  eps_start:    1.0
  eps_end:      0.05
  eps_decay:    0.995          # per-episode decay
  buffer_cap:   20000
  batch_size:   64
  warmup:       500
  n_episodes:   300
  patience:     50
  checkpoint_every: 50

output:
  model_dir:  "models"
  log_dir:    "logs"
  chart_dir:  "outputs"
  dpi:        150
